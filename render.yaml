services:
  - type: web
    name: student-notes-rag
    runtime: docker
    plan: starter  # Change to 'standard' or higher for production
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME.git  # Replace with your repo
    buildCommand: docker build -t student-notes-rag .
    startCommand: sh -c "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./student_notes.db
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: MAX_UPLOAD_SIZE_MB
        value: 10
      - key: ALLOWED_FILE_TYPES
        value: pdf,docx,txt
      - key: CHUNK_SIZE
        value: 400
      - key: CHUNK_OVERLAP
        value: 50
      - key: EMBEDDING_DIMENSION
        value: 768
      - key: TOP_K_RESULTS
        value: 8
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
    # Secret environment variables - Set these in Render Dashboard
    # - PINECONE_API_KEY
    # - PINECONE_PROJECT_ID
    # - PINECONE_INDEX_NAME
    # - PINECONE_ENVIRONMENT
    # - GEMINI_API_KEY
    # - JWT_SECRET_KEY
